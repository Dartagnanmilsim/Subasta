<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Subasta Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>🔨 SUBASTA PRO</h1>



<div class="card">

<button onclick="mostrar('adminLogin')">
⚙️ Administrador
</button>

<button onclick="mostrar('loginUsuario')">
🔥 Subastas en curso
</button>

<button onclick="mostrar('registro')">
👤 Crear usuario
</button>

</div>




<!-- =====================
CREAR USUARIO
====================== -->


<section id="registro" class="pantalla card">


<h2>Crear usuario</h2>


<input id="nombre" placeholder="Nombre completo">


<input id="usuario" placeholder="Usuario para subasta">


<input id="password" type="password" placeholder="Contraseña">


<label>

<input id="acepta" type="checkbox">

Acepto pagar el valor ofertado si gano la subasta

</label>


<button onclick="crearUsuario()">

Crear usuario

</button>


</section>







<!-- =====================
LOGIN PARTICIPANTE
====================== -->


<section id="loginUsuario" class="pantalla card">


<h2>Ingreso participante</h2>


<input id="loginUser" placeholder="Usuario">


<input id="loginPass" type="password" placeholder="Contraseña">


<button onclick="entrarUsuario()">

Entrar a subastas

</button>


</section>







<!-- =====================
ADMIN LOGIN
====================== -->


<section id="adminLogin" class="pantalla card">


<h2>Administrador</h2>


<input 
id="clave" 
type="password" 
placeholder="Contraseña administrador"
>


<button onclick="loginAdmin()">

Ingresar

</button>


</section>








<!-- =====================
ADMINISTRADOR
====================== -->


<section id="admin" class="pantalla card">


<h2>Panel administrador</h2>



<h3 id="totalUsuarios">

Usuarios inscritos: 0

</h3>





<h2>Crear subasta</h2>



<input 
id="titulo" 
placeholder="Nombre de la subasta"
>



<input

id="imagenArchivo"

type="file"

accept="image/*"

onchange="cargarImagen(event)"

>



<img 

id="previewImagen"

class="foto"

style="display:none"

>



<textarea 

id="descripcion"

placeholder="Descripción de la subasta"

></textarea>



<input 

id="base"

type="number"

placeholder="Precio base"

>



<input 

id="incremento"

type="number"

placeholder="Incremento por puja"

>



<input

id="fin"

type="datetime-local"

>



<button onclick="crearSubasta()">

Crear subasta

</button>





<h2>Subastas creadas</h2>


<div id="adminSubastas"></div>





<h2>Usuarios creados</h2>


<div id="listaUsuarios"></div>



</section>








<!-- =====================
SUBASTAS ACTIVAS
====================== -->


<section id="subastas" class="pantalla card">


<h2>🔥 Subastas activas</h2>


<div id="listaSubastas"></div>


</section>









<!-- =====================
DETALLE SUBASTA
====================== -->


<section id="detalle" class="pantalla card">



<img id="foto" class="foto">



<h2 id="nombreSubasta"></h2>



<p id="texto"></p>





<div class="oferta">



🔥 Oferta más alta



<h1 id="precio">

$0

</h1>




Ganando:


<br>


<b id="lider">

---

</b>




<hr>



⏳ Tiempo restante



<h2 id="tiempoRestante">

--

</h2>





<h2 id="estadoFinal">

</h2>



</div>





<button id="btnPuja">

PUJAR

</button>





<h2>

🏆 TOP 5

</h2>




<ol id="ranking"></ol>



</section>









<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>


<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>



<script src="script.js"></script>



</body>

</html>
