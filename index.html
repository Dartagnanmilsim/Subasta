<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>SubastaPro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<section class="hero">

<img id="foto" class="producto">

<h1 id="titulo">
Subasta activa
</h1>


<p>Precio base</p>

<h2 id="baseVista">
$0
</h2>


<div class="oferta">

🔥 Oferta más alta

<h1 id="precio">
$0
</h1>

<span id="lider">
Sin ofertas
</span>

</div>


<button onclick="ofertar()">
Hacer puja
</button>


</section>



<section class="ranking">

<h2>🏆 Top 5 ofertas</h2>

<div id="ranking"></div>

</section>




<section class="panel">

<h2>Registro ofertante</h2>


<input id="nombre" placeholder="Nombre">

<input id="celular" placeholder="Celular">

<input id="correo" placeholder="Correo">

<input id="ciudad" placeholder="Ciudad">


</section>



<section class="panel">

<h2>Crear subasta</h2>


<input id="clave" placeholder="Clave admin">

<input id="producto" placeholder="Producto">

<input id="imagen" placeholder="URL foto">

<input id="base" type="number" placeholder="Precio base">

<input id="incremento" type="number" placeholder="Incremento">

<input id="fin" type="datetime-local">


<button onclick="crearSubasta()">

Crear

</button>


</section>


</div>




<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<script src="firebase.js"></script>

<script src="script.js"></script>


</body>

</html>
