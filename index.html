<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Subastas</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>🔨 SUBASTAS</h1>


<div id="menu" class="card">

<button onclick="mostrar('loginAdmin')">
⚙️ Administrador
</button>


<button onclick="cargarSubastas()">
🔥 Subastas en curso
</button>


<button onclick="mostrar('registro')">
👤 Crear usuario
</button>

</div>



<!-- REGISTRO -->


<section id="registro" class="pantalla card">

<h2>Crear usuario</h2>


<input id="nombre" placeholder="Nombre completo">


<input id="usuario" placeholder="Usuario público">


<label>

<input type="checkbox" id="acepta">

Acepto pagar el valor ofertado si gano

</label>


<button onclick="crearUsuario()">

Crear usuario

</button>


</section>





<!-- LOGIN ADMIN -->


<section id="loginAdmin" class="pantalla card">


<h2>Administrador</h2>


<input id="clave" placeholder="Contraseña">


<button onclick="entrarAdmin()">

Entrar

</button>


</section>





<!-- ADMIN -->


<section id="admin" class="pantalla card">


<h2>Crear subasta</h2>


<h3 id="totalUsuarios">

Usuarios inscritos: 0

</h3>


<input id="titulo" placeholder="Nombre producto">


<input id="imagen" placeholder="URL imagen">


<textarea id="descripcion" placeholder="Descripción"></textarea>


<input id="base" type="number" placeholder="Precio base">


<input id="incremento" type="number" placeholder="Incremento puja">


<input id="fin" type="datetime-local">


<button onclick="crearSubasta()">

Crear subasta

</button>


<h2>Subastas creadas</h2>


<div id="adminSubastas"></div>


</section>





<!-- LISTA -->


<section id="subastas" class="pantalla card">


<h2>🔥 Activas</h2>


<div id="listaSubastas"></div>


</section>





<!-- DETALLE -->


<section id="detalle" class="pantalla card">


<img id="foto" class="foto">


<h2 id="nombreSubasta"></h2>


<p id="texto"></p>


<div class="precio">


🔥 Oferta ganadora


<h1 id="valorActual">$0</h1>


Ganando:

<b id="lider">---</b>


</div>


<button id="botonOferta">

PUJAR

</button>


<h2>🏆 TOP 5</h2>


<ol id="ranking"></ol>


</section>






<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<script src="script.js"></script>


</body>

</html>
