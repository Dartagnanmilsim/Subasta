<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>SubastaPro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<!-- VISTA SUBASTA -->


<div class="card">

<img id="imagenSubasta" class="imagen">


<h1 id="titulo">
Subasta
</h1>


<p>Precio base</p>

<h2 id="base">
$0
</h2>


<div class="ganando">

🔥 Oferta más alta

<h1 id="actual">
$0
</h1>


<p>
Ganando:
<b id="lider">---</b>
</p>


</div>


<button onclick="ofertar()">

PUJAR

</button>


</div>



<!-- TOP -->


<div class="card">

<h2>🏆 TOP 5</h2>

<ol id="ranking"></ol>

</div>




<!-- REGISTRO -->


<div class="card">

<h2>Registro</h2>


<input id="nombre" placeholder="Nombre">

<input id="celular" placeholder="Celular">

<input id="correo" placeholder="Correo">


</div>




<!-- ADMIN -->


<div class="card">

<h2>Administrador</h2>


<input id="clave" placeholder="Clave">

<input id="producto" placeholder="Producto">

<input id="foto" placeholder="URL imagen">

<input id="precioBase" type="number" placeholder="Precio base">

<input id="incremento" type="number" placeholder="Incremento">

<input id="cierre" type="datetime-local">


<button onclick="crearSubasta()">

Crear Subasta

</button>


</div>


</div>




<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<script src="script.js"></script>


</body>

</html>
