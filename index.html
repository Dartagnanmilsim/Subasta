<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Subastas</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>🔨 SUBASTAS</h1>



<!-- MENU PRINCIPAL -->


<div id="menu">


<button onclick="mostrar('adminLogin')">

⚙️ Administrador

</button>


<button onclick="cargarSubastas()">

🔥 Subastas en curso

</button>


<button onclick="mostrar('registro')">

👤 Crear usuario

</button>


</div>




<!-- REGISTRO USUARIO -->


<section id="registro" class="pantalla">


<h2>Crear usuario</h2>


<input id="nombre" placeholder="Nombre completo">


<input id="usuario" placeholder="Usuario público">


<label>

<input type="checkbox" id="acepta">

Acepto pagar el valor ofertado si gano la subasta

</label>



<button onclick="crearUsuario()">

Crear usuario

</button>


</section>






<!-- ADMIN LOGIN -->


<section id="adminLogin" class="pantalla">


<h2>Administrador</h2>


<input id="clave" placeholder="Contraseña">


<button onclick="entrarAdmin()">

Ingresar

</button>


</section>







<!-- ADMIN CREAR SUBASTA -->


<section id="admin" class="pantalla">


<h2>Nueva subasta</h2>


<input id="titulo" placeholder="Nombre subasta">

<input id="imagen" placeholder="URL imagen">

<textarea id="descripcion" placeholder="Descripción"></textarea>


<input id="base" type="number" placeholder="Precio base">


<input id="incremento" type="number" placeholder="Incremento">


<input id="fin" type="datetime-local">


<button onclick="crearSubasta()">

Crear subasta

</button>


</section>







<!-- LISTA SUBASTAS -->


<section id="subastas" class="pantalla">


<h2>🔥 Activas</h2>


<div id="listaSubastas"></div>


</section>







<!-- DETALLE SUBASTA -->


<section id="detalle" class="pantalla">


<img id="foto" class="foto">


<h2 id="nombreSubasta"></h2>


<p id="texto"></p>



<div class="precio">


🔥 Oferta ganadora


<h1 id="valorActual">

$0

</h1>


<p>

Ganando:

<b id="lider">---</b>

</p>


</div>



<button id="botonOferta">

PUJAR

</button>




<h2>🏆 TOP 5</h2>


<ol id="ranking"></ol>


</section>






<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>


<script src="script.js"></script>


</body>

</html>
